<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河南旅游网</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .text-shadow {
                text-shadow: 0 2px 4px rgba(0,0,0.5);
            }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D4A017', // 主色调：金色/土黄色
                    },
                    fontFamily: {
                        sans: ['Microsoft YaHei', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <nav class="bg-primary text-white sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center">
            <div class="font-bold text-xl mb-2 md:mb-0">河南旅游网</div>
            <div class="flex space-x-4 md:space-x-8 text-sm md:text-base">
                <a href="index.html" class="hover:text-yellow-200 transition">首页</a>
                <a href="attractions.html" class="hover:text-yellow-200 transition">热门景点</a>
                <a href="food.html" class="hover:text-yellow-200 transition">特产美食</a>
                <a href="culture.html" class="hover:text-yellow-200 transition">风俗人文</a>
                <a href="survey.html" class="hover:text-yellow-200 transition">用户调研</a>
            </div>
        </div>
    </nav>

<!-- 轮播图（支持8张景点图片轮播） -->
<div class="relative h-64 md:h-96 overflow-hidden">
    <div id="carousel" class="flex transition-transform duration-700 ease-in-out h-full">
        <!-- 1. 龙门石窟 -->
        <div class="min-w-full h-full bg-cover bg-center" style="background-image: url('images/longmen.jpg');">
            <div class="h-full flex items-center justify-center bg-black/30">
                <h2 class="text-white text-2xl md:text-4xl font-bold text-shadow">龙门石窟</h2>
            </div>
        </div>
        <!-- 2. 白马寺 -->
        <div class="min-w-full h-full bg-cover bg-center" style="background-image: url('images/baimasi.jpg');">
            <div class="h-full flex items-center justify-center bg-black/30">
                <h2 class="text-white text-2xl md:text-4xl font-bold text-shadow">白马寺</h2>
            </div>
        </div>
        <!-- 3. 老君山 -->
        <div class="min-w-full h-full bg-cover bg-center" style="background-image: url('images/laojunshan.jpg');">
            <div class="h-full flex items-center justify-center bg-black/30">
                <h2 class="text-white text-2xl md:text-4xl font-bold text-shadow">老君山</h2>
            </div>
        </div>
        <!-- 4.龙亭公园 -->
        <div class="min-w-full h-full bg-cover bg-center" style="background-image: url('images/longting.jpg');">
            <div class="h-full flex items-center justify-center bg-black/30">
                <h2 class="text-white text-2xl md:text-4xl font-bold text-shadow">龙亭公园</h2>
            </div>
        </div>
    </div>
    <!-- 轮播控制按钮 -->
    <button id="prevBtn" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/70 transition">‹</button>
    <button id="nextBtn" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/70 transition">›</button>
</div>

    <!-- 城市入口【已改为圆形图片】 -->
    <section class="py-10 container mx-auto px-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
            <!-- 洛阳 -->
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-primary overflow-hidden">
                    <img src="images/luoyang.jpg" alt="洛阳" class="w-full h-full object-cover">
                </div>
                <p class="mt-2 font-medium">洛阳</p>
            </div>
            <!-- 开封 -->
            <div class="flex flex-col items-center">
                <div class="w-20 h-24 md:w-24 md:h-24 rounded-full border-4 border-primary overflow-hidden">
                    <img src="images/kaifeng.jpg" alt="开封" class="w-full h-full object-cover">
                </div>
                <p class="mt-2 font-medium">开封</p>
            </div>
            <!-- 郑州 -->
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-primary overflow-hidden">
                    <img src="images/zhengzhou.jpg" alt="郑州" class="w-full h-full object-cover">
                </div>
                <p class="mt-2 font-medium">郑州</p>
            </div>
            <!-- 安阳 -->
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-primary overflow-hidden">
                    <img src="images/anyang.jpg" alt="安阳" class="w-full h-full object-cover">
                </div>
                <p class="mt-2 font-medium">安阳</p>
            </div>
        </div>
    </section>

    <!-- 河南宣传片部分 -->
    <section class="py-8 bg-white">
        <div class="container mx-auto px-4">
            <h3 class="text-xl md:text-2xl font-bold text-center text-primary mb-6">—— 河南宣传片 ——</h3>
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <div class="w-full md:w-2/3">
                    <div class="aspect-video bg-gray-200 rounded-lg overflow-hidden">
                        <video controls class="w-full h-full object-cover">
                            <source src="images/henan-promo.mp4" type="video/mp4">
                            您的浏览器不支持视频播放
                        </video>
                    </div>
                </div>
                <div class="w-full md:w-1/3 text-gray-700 text-sm md:text-base">
                    <p>这片中原大地既古老又现代，没有人知道还有多少厚重的历史等待去发现。而即便是那些早已闻名遐迩的古迹，以我们当下的认知，也仅仅只触摸到文明的一角。</p>
                    <p class="mt-2">每种文化都是独特而珍贵的，尊重和传承它们的价值，也是在守护我们共同的根脉。人们对美好生活的向往，建立在文化传承的基础之上。这一愿景宏大且深邃，它既蕴含着中原智慧，也承载着华夏文明的未来。</p>
                    <p class="mt-2 text-gray-500 text-xs">视频来源：抖音</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-4 text-center text-sm">
        <p>©河南旅游</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
